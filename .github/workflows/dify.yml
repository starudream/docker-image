name: docker-dify

permissions:
  packages: write

on:
  workflow_dispatch:
  push: { paths: [ 'dify/**' ] }

jobs:

  dify-web:
    runs-on: ubuntu-latest
    env:
      VERSION: 1.15.0
      DOCKER_TAG: 1.15.0-1
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - run: |
          cd dify/dify
          git fetch --verbose --prune --tags
          git checkout -b ${{ env.VERSION }} ${{ env.VERSION }}
          sed -i 's|$NEXT_PUBLIC_BASE_PATH|/dify|g' web/Dockerfile
          cd ..
          ./patch-1.15.0.sh ./dify
      - uses: docker/login-action@v4
        with:
          username: starudream
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: starudream
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          tags: starudream/dify-web:${{ env.DOCKER_TAG }},ghcr.io/starudream/dify-web:${{ env.DOCKER_TAG }}
          context: dify/dify
          file: dify/dify/web/Dockerfile
          platforms: linux/amd64
          pull: true
          push: true
          cache-from: type=gha,scope=${{ github.job }}
          cache-to: type=gha,mode=max,scope=${{ github.job }}
